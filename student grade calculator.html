<!DOCTYPE html>
<html>
<head>
    <title>Student Grade Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2 class="text-center">Student Grade Calculator</h2>
<p><b>Enter student name:</b></p>
<input type="text" id="name" class="form-control mb-2" placeholder="Student Name">

<p><b>Subject-1</b></p>
<input type="number" id="s1" class="form-control mb-2" placeholder="Subject 1">
<p><b>Subject-2</b></p>
<input type="number" id="s2" class="form-control mb-2" placeholder="Subject 2">
<p><b>Subject-3</b></p>
<input type="number" id="s3" class="form-control mb-2" placeholder="Subject 3">
<p><b>Subject-4</b></p>
<input type="number" id="s4" class="form-control mb-2" placeholder="Subject 4">
<p><b>Subject-5</b></p>
<input type="number" id="s5" class="form-control mb-2" placeholder="Subject 5">
<p><b>Subject-6</b></p>
<input type="number" id="s6" class="form-control mb-2" placeholder="Subject 6">

<button class="btn btn-primary" onclick="calculate()">Calculate</button>

<h4 id="result" class="mt-3"></h4>

<script>

function calculate()
{
    let name=document.getElementById("name").value;

    let marks=[
        Number(document.getElementById("s1").value),
        Number(document.getElementById("s2").value),
        Number(document.getElementById("s3").value),
        Number(document.getElementById("s4").value),
        Number(document.getElementById("s5").value),
        Number(document.getElementById("s6").value)
    ];

    let total=0;
    let average=0;
    let grade="";
    let fail=false;

    if(name=="")
    {
        alert("Enter Student Name");
        return;
    }

    for(let i=0;i<marks.length;i++)
    {
        if(marks[i]<0 || marks[i]>100 || isNaN(marks[i]))
        {
            alert("Enter marks between 0 and 100");
            return;
        }

        if(marks[i]<35)
        {
            fail=true;
        }

        total+=marks[i];
    }

    average=total/6;

    if(fail)
        grade="FAIL";
    else if(average>=90)
        grade="A";
    else if(average>=75)
        grade="B";
    else if(average>=60)
        grade="C";
    else
        grade="D";

    document.getElementById("result").innerHTML=
    "Name : "+name+
    "<br>Total : "+total+
    "<br>Average : "+average.toFixed(2)+
    "<br>Grade : "+grade;
}

</script>

</body>
</html>
